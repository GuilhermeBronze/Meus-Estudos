<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
    <link rel="stylesheet" href="estilo.css">

</head>
<body>
   <header>
    <h1>Verificador de Idade</h1>

   </header> 

   <section>
    <div>
        <p>Ano de Nascimento
            <input type="number" id="txtano" min="0">
        </p>

        <p>Sexo:
            <input type="radio" name='radsex' id="masc" checked>
            <label for="masc">Masculino</label>

            <input type="radio" name='radsex' id="fem">
            <label for="fem">Feminino</label>
        </p>

        <p>
            <input type="button" value="Verificar" onclick="verificar()">
        </p>
    </div>

    <div id="res">
        Preencha os dados acima para ver o resultado.
    </div>

    <div id="imagem">

    </div>

   </section>

   <footer>
        <p>&copy; Curso em Vídeo</p>
   </footer>

   <script src="script.js"></script>
    

</body>
</html>

<!--
&copy - simbolo de copyright

digitar o codigo "link:css" permite criar as tags de "style" em um arquivo externo
estrutura final - <link rel="stylesheet" href="exemplo.css">
                                                   /\ nome do arquivo externo aqui

digitar o codigo "script:src" permite criar o script do site em um arquivo externo
estrutura final - <script src="script.js"></script>
                                  /\ nome do arquivo externo aqui

ctrl + botão direito no nome de arquivo indicado, tanto em "link:css" quanto em "script:src", cria o arquivo
automaticamente na pasta inicial do site. 


-->
