<!--
&copy - simbolo de copyright

digitar o codigo "link:css" permite criar as tags de "style" em um arquivo externo
estrutura final - <link rel="stylesheet" href="exemplo.css">
                                                   /\ nome do arquivo externo aqui

digitar o codigo "script:src" permite criar o script do site em um arquivo externo
estrutura final - <script src="script.js"></script>
                                  /\ nome do arquivo externo aqui

ctrl + botão direito no nome de arquivo indicado, tanto em "link:css" quanto em "script:src", cria o arquivo
automaticamente na pasta inicial do site. 


-->
