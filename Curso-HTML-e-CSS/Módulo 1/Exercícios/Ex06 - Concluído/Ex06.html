<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>
        Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse <br>
        sobre os termos para descobrir qual tag faz o que.
    </p>
    <p>
        <ul type="circle">
            
            <li><abbr title="tag <p>">Parágrafos</abbr>
            <li><abbr title="tags <h1> até <h6>">Títulos</abbr>
            <li><abbr title="tag <img>">Imagens</abbr>
            <li><abbr title="tag <abbr>">Abreviações</abbr>
            <li><abbr title="tag <ol>">Listas ordenadas</abbr>
            <li><abbr title="tag <ul>">Listas não ordenadas</abbr>
            <li><abbr title="tag <a>">Links</abbr>

        </ul>
    </p>




</body>
</html>
