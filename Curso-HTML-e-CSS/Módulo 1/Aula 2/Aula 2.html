    <h1>Páragrafos e quebras de linha</h1>
    <hr>
    <p> Para acrescentar os sinais de < e > ao texto de um site, usam se os códigos
        "& l t" e "& g t" respectivamente. lt = < e gt = ><br>
        Alguns símbolos especiais: <br>
        & r e g = ® <br>
        & c o p y = © <br>
        & t r a d e = ™ <br>
        & e u r o = € <br>
        & p o u n d = £ <br>
        & y e n = ¥ <br>
        & c e n t =  ¢ <br>
        &#x2600
        &#x2614
        ☪ 
    </p>
