<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <style>
        div{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            height: 200px;
            width: 200px;
        }
        #d1 > p{
            display: none;
        }

        div#d1:hover {
            background-color: aqua;
        }
        #d1:active > p{
            display: block;
        } 

        div#d2:active {
            background-color: blueviolet;
        }
        div#d3:hover {
            background-color: teal;
        }

    </style>
</head>
<body>
    <div id="d1">01
        <p>Teste Oculto</p>
    </div>
    <div id="d2">02</div>
    <div id="d3">03</div>


    
</body>
</html>
