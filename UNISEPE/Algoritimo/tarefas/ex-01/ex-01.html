<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de transações</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        
        <form action="#">
            <div>
                <p><label for="nome">Nome:</label>               <input type="text" id="nome"></p>
                <p><label for="nasc">Data de Nascimento:</label> <input type="date" id="nasc"></p>
                <p><label for="cpf">CPF:</label>                 <input type="number" id="cpf"></p>
                <p><label for="telefone">Telefone:</label>       <input type="tel" id="telefone"></p>
            </div>
            <div>
                <p><label for="saldoOriginal">Saldo Original da Conta:</label> <input type="number" id="saldoOriginal"></p>
            </div>
            <div>
                <p>
                    <label for="deposito">Deposito:</label> <input type="number" id="deposito">
                    <label for="saque">Saque: </label><input type="number" id="saque">
                </p>
            </div>
        </form>

        <div>
            <p>Novo Saldo:</p>
        </div>










    </section>
</body>
</html>
